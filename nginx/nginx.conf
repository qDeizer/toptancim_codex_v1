# =============================================================================
# Toptancım B2B — Nginx Reverse Proxy Yapılandırması
# =============================================================================
# Bu dosya şu görevleri yerine getirir:
#   1. Flutter Web uygulamasını statik dosya olarak servis eder
#   2. /api/* isteklerini backend Node.js sunucusuna proxy eder
#   3. /uploads/* isteklerini backend'e proxy eder (ürün/profil resimleri)
#   4. /socket.io/* isteklerini WebSocket upgrade ile backend'e proxy eder
# =============================================================================

upstream backend_upstream {
    server backend:3002;
}

server {
    listen 80;
    server_name _;

    # Maksimum upload boyutu (backend'deki 5MB/10MB limitiyle uyumlu)
    client_max_body_size 20M;

    # Gzip sıkıştırma
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 1000;
    gzip_vary on;

    # -----------------------------------------------------------------
    # 1. Frontend (Flutter Web) — Statik dosyalar
    # -----------------------------------------------------------------
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;

        # Flutter'ın asset cache'lemesi için
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # -----------------------------------------------------------------
    # 2. Backend API Proxy
    # -----------------------------------------------------------------
    location /api/ {
        proxy_pass http://backend_upstream/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Uzun süren AI istekleri için timeout
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }

    # -----------------------------------------------------------------
    # 3. Uploads (Kullanıcı yüklemeleri — profil, ürün, medya)
    # -----------------------------------------------------------------
    location /uploads/ {
        proxy_pass http://backend_upstream/uploads/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Statik dosya cache'lemesi
        expires 7d;
        add_header Cache-Control "public";
    }

    # -----------------------------------------------------------------
    # 4. Socket.IO WebSocket Proxy (KRİTİK!)
    # -----------------------------------------------------------------
    # Bildirimler, sepet güncellemeleri ve gerçek zamanlı iletişim için zorunlu.
    # Bu blok olmazsa WebSocket bağlantısı kurulamaz!
    # -----------------------------------------------------------------
    location /socket.io/ {
        proxy_pass http://backend_upstream/socket.io/;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket bağlantı timeout (24 saat)
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # -----------------------------------------------------------------
    # Güvenlik headers
    # -----------------------------------------------------------------
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
}
